/* ---- localStorage 自動累積：把檔案內建的 HISTORY 併入這台電腦看過的舊快照 ---- */
const LS_KEY = "zhubei_scan_history_v1";
function loadMerged(){
  let stored = [];
  try { stored = JSON.parse(localStorage.getItem(LS_KEY) || "[]"); } catch(e){ stored = []; }
  const byId = {};
  stored.forEach(s => { if(s && s.id) byId[s.id] = s; });
  HISTORY.forEach(s => { byId[s.id] = s; });          // 檔案內的為最新定義，覆蓋同 id
  const merged = Object.values(byId).sort((a,b)=> a.id < b.id ? 1 : -1);  // id(時間) 由新到舊
  try { localStorage.setItem(LS_KEY, JSON.stringify(merged)); } catch(e){}
  return merged;
}
const SNAPSHOTS = loadMerged();

const typeMeta = { floor:{label:"整層住家",cls:"b-floor"}, suite:{label:"獨立套房",cls:"b-suite"} };
const sel = document.getElementById('periodSel');
SNAPSHOTS.forEach((s,i)=>{
  const o=document.createElement('option'); o.value=String(i);
  o.textContent = s.label + `（${s.picks.length} 筆）`;
  sel.appendChild(o);
});

function render(i){
  const snap = SNAPSHOTS[i];
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if(!snap.picks.length){ grid.innerHTML='<div class="empty">本時段沒有符合品質標準的新上架物件。</div>'; }
  snap.picks.forEach(p=>{
    const t=typeMeta[p.type];
    const el=document.createElement('div'); el.className='card';
    el.innerHTML=`
      <div class="top">
        <span class="badge ${t.cls}">${t.label}</span>
        <span class="price">${p.price}<small> 元/月</small></span>
      </div>
      <div class="title">${p.title}</div>
      <div class="spec">${p.spec}</div>
      <div class="loc">📍 ${p.loc}</div>
      <div class="tags">${p.tags.map(x=>`<span class="tag">${x}</span>`).join('')}</div>
      <div class="verdict"><span class="vlabel">品質判定：</span>${p.verdict} ${p.photo?'<span class="photo">✓ 照片確認</span>':''}</div>
      ${p.extra?`<div class="loc">💡 ${p.extra}</div>`:''}
      <a class="go" href="${p.url}" target="_blank" rel="noopener">在 591 查看物件 →</a>`;
    grid.appendChild(el);
  });

  const floors=snap.picks.filter(p=>p.type==='floor').length, suites=snap.picks.filter(p=>p.type==='suite').length;
  document.getElementById('metaBar').innerHTML=
    `<span class="pill">時段 <b>${snap.label}</b></span>`+
    `<span class="pill">通過品質篩選 <b>${snap.picks.length}</b> 筆</span>`+
    `<span class="pill">整層住家 <b>${floors}</b> · 獨立套房 <b>${suites}</b></span>`+
    `<span class="pill">共保留 <b>${SNAPSHOTS.length}</b> 個時段</span>`;

  const rejWrap=document.getElementById('rejWrap');
  rejWrap.innerHTML = (snap.rejected && snap.rejected.length)
    ? `<h3>本時段已排除（示例）</h3><ul>${snap.rejected.map(r=>`<li>${r}</li>`).join('')}</ul>` : '';
}

sel.addEventListener('change', e=> render(parseInt(e.target.value,10)));
render(0);
